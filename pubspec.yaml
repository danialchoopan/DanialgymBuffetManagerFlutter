name: gym_buffet_manager
description: A comprehensive offline-first gym and buffet management system built with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Persian Font
  vazirmatn: ^1.0.0

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Database & Storage
  floor: ^1.4.2
  sqflite: ^2.3.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.6.0

  # Navigation
  go_router: ^12.1.3

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  path_provider: ^2.1.0
  permission_handler: ^11.0.0

  # PDF & Printing
  pdf: ^3.10.4
  printing: ^5.11.0

  # Excel Export
  excel: ^2.0.0

  # QR & Barcode
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5

  # Image Handling
  image_picker: ^1.0.4

  # Authentication
  local_auth: ^2.1.6

  # Notifications
  flutter_local_notifications: ^16.0.0

  # Charts
  fl_chart: ^0.65.0

  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  floor_generator: ^1.4.2
  json_serializable: ^6.7.1
  hive_generator: ^2.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Thin.ttf
          weight: 100
        - asset: assets/fonts/Vazirmatn-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Vazirmatn-Light.ttf
          weight: 300
        - asset: assets/fonts/Vazirmatn-Regular.ttf
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.ttf
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
        - asset: assets/fonts/Vazirmatn-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Vazirmatn-Black.ttf
          weight: 900