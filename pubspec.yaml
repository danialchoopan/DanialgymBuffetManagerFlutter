name: gym_buffet_manager
description: A comprehensive offline-first gym and buffet management system built with Clean Architecture.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  equatable: ^2.0.5
  dartz: ^0.10.1
  intl: ^0.18.1
  google_fonts: ^6.1.0
  flutter_bloc: ^8.1.3
  get_it: ^7.6.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  go_router: ^12.1.3
  uuid: ^4.2.1
  path_provider: ^2.1.0
  fl_chart: ^0.65.0
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true